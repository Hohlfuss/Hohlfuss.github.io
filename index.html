<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSK clicker</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="sectionLeft">
        <center>
            <div class="scoreContainer unselectable">
                <span id="score">0</span> kännipistettä<br>
                <span id="scorepersecond">0</span>kps
            </div>
            <br>
            <div class="clickContainer unselectable">
                <img src="images/Kojonperä.jpg" height="296px" width="256px" id="clicker">
                <br>
            
            </div>
        </center>

        <div class="sectionFooter">
            <h5>NSK Clicker</h5>
            <button onclick="resetGame();">Resettaa</button>
            <p> tässä on kyllä 30 sekunnin välein auto savekin</p>
            <br>
            <button onclick="saveGame();">Tallenna</button>
        </div>
    </div>

    <div class="sectionRight">
        <div id="upgradeContainer"></div>
        <div id="shopContainer"></div>
    </div>
    <script src="main.js"></script>
    
</body>
</html>
